<!DOCTYPE html>
<html lang="es" data-theme="light" data-accent="laurel" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Blisniuk & Amanov · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,400&family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ds.css">
<style>
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #F2EDE1; z-index: 999; transition: opacity .4s; }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .mk { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
    background: linear-gradient(150deg, #4A6A4B, #1F2E20); color: #CBAA73; font-family: 'Fraunces', serif; font-style: italic; font-size: 28px;
    animation: bp 1.4s ease-in-out infinite; }
  @keyframes bp { 50% { transform: scale(1.08); opacity: .8; } }
</style>
</head>
<body>
<div id="boot"><div class="mk">B</div></div>
<div id="root"></div>

<script type="module" src="/src/main.jsx"></script>

<template id="__bundler_thumbnail" data-bg-color="#1F2E20">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#1F2E20"/>
    <text x="600" y="430" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="240" fill="#CBAA73">B&amp;A</text>
    <text x="600" y="520" text-anchor="middle" font-family="monospace" font-size="40" letter-spacing="14" fill="#8FA08C">COMMAND CENTER</text>
  </svg>
</template>
</body>
</html>
