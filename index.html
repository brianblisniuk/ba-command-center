<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #F2EDE1; z-index: 999; transition: opacity .4s; }
  #boot.gone { opacity: 0; pointer-events: none; }
  #boot .mk { width: 56px; height: 56px; border-radius: 16px; display: grid; place-items: center;
    background: linear-gradient(150deg, #4A6A4B, #1F2E20); color: #CBAA73; font-family: 'Fraunces', serif; font-style: italic; font-size: 28px;
    animation: bp 1.4s ease-in-out infinite; }
  @keyframes bp { 50% { transform: scale(1.08); opacity: .8; } }
</style>
</head>
<body>
<div id="boot"><div class="mk">B</div></div>
<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script type="text/babel" data-presets="env,react">
  // hide boot splash once React has mounted
  (function () {
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      const root = document.getElementById('root');
      if ((root && root.childElementCount > 0) || tries > 40) {
        const b = document.getElementById('boot');
        if (b) { b.classList.add('gone'); setTimeout(() => b.remove(), 450); }
        clearInterval(iv);
      }
    }, 100);
  })();
</script>

  </svg>
